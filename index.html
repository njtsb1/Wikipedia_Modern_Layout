<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ankipedia — Knowledge, reimagined</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header" role="banner">
    <div class="header-inner">
      <a href="#" class="logo" id="home" aria-label="Ankipedia home">
        <!-- Simple SVG logo -->
        <svg width="40" height="40" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <rect x="2" y="2" width="20" height="20" rx="3" fill="var(--accent)"></rect>
          <path d="M7 9h10M7 13h10M7 17h6" stroke="#fff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="site-title">Ankipedia</span>
      </a>

      <div class="controls" role="navigation" aria-label="Main controls">
        <label class="sr-only" for="lang-select">Language</label>
        <select id="lang-select" aria-label="Select language">
          <option value="en">English (EN-US)</option>
          <option value="pt-BR">Português (PT-BR)</option>
          <option value="es">Español (ES)</option>
        </select>

        <button id="theme-toggle" class="icon-btn" aria-pressed="true" aria-label="Toggle theme">
          <!-- Moon icon (dark) and Sun icon (light) swapped by CSS -->
          <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="currentColor"/>
          </svg>
          <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path d="M12 4V2M12 22v-2M4 12H2M22 12h-2M5 5l-1.5-1.5M20.5 20.5L19 19M19 5l1.5-1.5M4.5 19.5L6 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <circle cx="12" cy="12" r="3" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="search-bar" role="search" aria-label="Search Ankipedia">
      <form id="search-form" autocomplete="off">
        <label for="search-input" class="sr-only">Search</label>
        <input id="search-input" name="q" type="search" placeholder="Search articles..." aria-label="Search articles" />
        <button type="submit" class="search-btn" aria-label="Search">
          🔎
        </button>
      </form>
    </div>
  </header>

  <main id="main" class="container" role="main">
    <nav class="toc" aria-label="Article list">
      <h2 id="list-title">Featured articles</h2>
      <ul id="article-list" class="article-list" role="list"></ul>
    </nav>

    <article id="article-view" class="article-view" tabindex="-1" aria-live="polite">
      <header>
        <h1 id="article-title">Welcome to Ankipedia</h1>
        <p id="article-meta" class="meta">An educational demo.</p>
      </header>

      <section id="article-content">
        <p>...</p>
      </section>

      <footer class="article-footer">
        <button id="back-to-list" class="btn">Back to list</button>
      </footer>
    </article>
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="footer-inner">
      <p id="footer-text">Ankipedia — inspired by Game of Thrones theme.</p>
      <p class="small">Built with HTML5, CSS3 and vanilla JS.</p>
    </div>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
